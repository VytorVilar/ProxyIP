<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Visitor Scanner</title>

<style>

body{
background:black;
color:#00ff9c;
font-family:monospace;
margin:0;
padding:40px;
text-align:center;
}

h1{
font-size:40px;
margin-bottom:30px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
border:1px solid #00ff9c;
padding:15px;
margin:10px;
background:rgba(0,0,0,0.7);
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>CYBER VISITOR SCANNER</h1>

<div class="grid">

<div class="card">
IP do visitante
</div>

<div class="card">
Localização detectada
</div>

<div class="card">
Sistema operacional
</div>

<div class="card">
Navegador
</div>

<div class="card">
Resolução da tela
</div>

<div class="card">
Idioma
</div>

<div class="card">
Registro enviado para o banco
</div>

</div>

<p id="status">Analisando visitante...</p>

</div>

<!-- SCRIPT QUE ENVIA OS DADOS PARA O FIREBASE -->
<script type="module" src="script.js"></script>

</body>

</html>
