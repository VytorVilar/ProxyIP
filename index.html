<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Visitor Scanner</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>CYBER VISITOR SCANNER</h1>

<div class="grid">

<div class="card">IP: <span id="ip">...</span></div>
<div class="card">País: <span id="pais">...</span></div>
<div class="card">Cidade: <span id="cidade">...</span></div>
<div class="card">Provedor: <span id="provedor">...</span></div>
<div class="card">Sistema: <span id="sistema">...</span></div>
<div class="card">Navegador: <span id="navegador">...</span></div>
<div class="card">Idioma: <span id="idioma">...</span></div>
<div class="card">Resolução: <span id="resolucao">...</span></div>

</div>

<p id="status">Analisando visitante...</p>

</div>

<script type="module" src="script.js"></script>
  
</body>
</html>
