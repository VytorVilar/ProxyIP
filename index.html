<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Cyber Intelligence Panel</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<canvas id="matrix"></canvas>

<h1>CYBER INTELLIGENCE SYSTEM</h1>

<div class="grid">

<div class="panel">

<h3>Terminal</h3>

<div id="terminal"></div>

</div>

<div class="panel">

<h3>Visitor Data</h3>

<div>IP: <span id="ip"></span></div>
<div>Cidade: <span id="city"></span></div>
<div>País: <span id="country"></span></div>
<div>ISP: <span id="isp"></span></div>

<div>Navegador: <span id="browser"></span></div>
<div>Sistema: <span id="os"></span></div>
<div>Idioma: <span id="lang"></span></div>

<div>CPU: <span id="cpu"></span></div>
<div>RAM: <span id="ram"></span></div>

<div>Câmera: <span id="cam"></span></div>
<div>Microfone: <span id="mic"></span></div>

</div>

<div class="panel">

<h3>Memory Monitor</h3>

<canvas id="memChart"></canvas>

</div>

<div class="panel">

<h3>Location</h3>

<div id="map"></div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
